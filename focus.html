<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJ Focus Chronicles - Productivité RPG</title>
    <link rel="stylesheet" href="lock-overlay.css">
    <style>
        :root {
            --neon-color: #00ffe7;
        }
        * {
            box-sizing: border-box;
        }
        body {
            background: #181c24;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0 0.7rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        #app-container {
            margin: 2.5rem auto 0 auto;
            background: rgba(24,28,36,0.97);
            border-radius: 20px;
            box-shadow: 0 0 32px 4px var(--neon-color), 0 0 0 2px var(--neon-color) inset;
            padding: 2.5rem 2rem 2rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            max-width: 370px;
            width: min(95vw, 370px);
        }
        h1 {
            font-size: 2.2rem;
            color: var(--neon-color);
            text-shadow: 0 0 8px var(--neon-color), 0 0 2px #fff;
            margin-bottom: 0.5rem;
        }
        .miner {
            font-size: 3.5rem;
            margin: 0.5rem 0 0.5rem 0;
            filter: drop-shadow(0 0 12px var(--neon-color));
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 4.5rem;
            width: 4.5rem;
            user-select: none;
        }
        .miner.mining {
            animation: miningAnim 0.5s infinite alternate;
        }
        @keyframes miningAnim {
            0% { transform: rotate(-18deg) scale(1.08); }
            100% { transform: rotate(18deg) scale(1.18); }
        }
        .timer {
            font-size: 3rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 12px var(--neon-color), 0 0 2px #fff;
            margin-bottom: 0.5rem;
        }
        .controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }
        .controls input[type="number"] {
            width: 60px;
            padding: 0.3rem;
            border-radius: 8px;
            border: none;
            background: #23283a;
            color: var(--neon-color);
            font-size: 1.1rem;
            outline: none;
            box-shadow: 0 0 4px var(--neon-color) inset;
            text-align: center;
        }
        .controls button {
            background: linear-gradient(90deg, var(--neon-color) 0%, #00bfff 100%);
            color: #181c24;
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1.2rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 8px var(--neon-color);
            transition: background 0.2s, color 0.2s;
        }
        .controls button:hover {
            background: linear-gradient(90deg, #00bfff 0%, var(--neon-color) 100%);
            color: #fff;
        }
        .copy-btn {
            margin: 1.1rem auto 0;
            display: inline-block;
            background: linear-gradient(90deg, var(--neon-color) 0%, #00bfff 100%);
            color: #181c24;
            border: none;
            border-radius: 10px;
            padding: 0.48rem 1rem;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-color);
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
        }
        .copy-btn:hover {
            background: linear-gradient(90deg, #00bfff 0%, var(--neon-color) 100%);
            color: #fff;
            box-shadow: 0 0 16px var(--neon-color);
        }
        .diamonds {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.3rem;
            color: #fff;
            text-shadow: 0 0 8px var(--neon-color);
        }
        .diamond-icon {
            font-size: 1.5rem;
            color: var(--neon-color);
            filter: drop-shadow(0 0 6px var(--neon-color));
        }
        .resources {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.3rem;
            color: #fff;
            text-shadow: 0 0 8px #ffd700;
        }
        .resource-icon {
            font-size: 1.5rem;
            color: #ffd700;
            filter: drop-shadow(0 0 6px #ffd700);
        }
        .rank-section {
            margin-top: 0.5rem;
            font-size: 1.1rem;
            color: var(--neon-color);
            text-shadow: 0 0 8px var(--neon-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .kofi-btn {
            margin-top: 1.5rem;
            display: block;
            background: linear-gradient(90deg, #ff5f5f 0%, #ffb347 100%);
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 1.2rem 0;
            border-radius: 16px;
            text-decoration: none;
            box-shadow: 0 0 24px #ff5f5f;
            letter-spacing: 1px;
            width: 100%;
            text-align: center;
            max-width: 350px;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .kofi-btn:hover {
            background: linear-gradient(90deg, #ffb347 0%, #ff5f5f 100%);
            box-shadow: 0 0 32px #ffb347;
        }
        .alert {
            color: #ff5f5f;
            font-weight: bold;
            margin-top: 1rem;
            text-shadow: 0 0 8px #ff5f5f;
            display: none;
        }
        .badges-section {
            margin-top: 1.5rem;
            width: 100%;
        }
        #badgesAccordion {
            width: 100%;
            margin: 0.1rem 0 0.2rem 0;
            border-radius: 10px;
            background: rgba(24,28,36,0.98);
            box-shadow: 0 0 8px var(--neon-color) inset;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }
        #badgesAccordion summary {
            font-size: 1rem;
            padding: 0.55rem 0.4rem;
            outline: none;
            cursor: pointer;
            border-radius: 8px;
            background: none;
            user-select: none;
            text-align: center;
            color: var(--neon-color);
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #222a;
            transition: background 0.2s;
        }
        #badgesAccordion[open] summary {
            background: rgba(0,255,231,0.08);
        }
        #badgesAccordion:not([open]) #badgesList {
            display: none;
        }
        #badgesList {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            row-gap: 0.8rem;
        }
        .badge-ico {
            font-size: 2rem;
            transition: filter 0.3s, box-shadow 0.3s;
            border-radius: 50%;
            padding: 0.2rem;
            cursor: pointer;
        }
        .badge-shine {
            animation: shine 1.2s infinite alternate;
        }
        @keyframes shine {
            0% { filter: drop-shadow(0 0 8px var(--neon-color)); }
            100% { filter: drop-shadow(0 0 24px var(--neon-color)); }
        }
        .badge-tooltip {
            pointer-events: none;
            user-select: none;
            opacity: 0.98;
            transition: opacity 0.2s;
            position: fixed;
            min-width: 160px;
            background: rgba(24,28,36,0.98);
            color: var(--neon-color);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            box-shadow: 0 0 12px var(--neon-color);
            font-size: 1rem;
            text-align: center;
            z-index: 4000;
        }
        .hub-link {
            display: block;
            margin: 2.2rem auto 0 auto;
            color: var(--neon-color);
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            text-decoration: none;
            text-shadow: 0 0 8px var(--neon-color);
            border-radius: 10px;
            padding: 0.7rem 0;
            background: rgba(0,255,231,0.07);
            box-shadow: 0 0 8px var(--neon-color) inset;
            max-width: 350px;
            transition: background 0.2s, color 0.2s;
        }
        .hub-link:hover {
            background: var(--neon-color);
            color: #181c24;
            box-shadow: 0 0 24px var(--neon-color);
        }
        @media (max-width: 600px) {
            #app-container {
                width: 100%;
                max-width: 420px;
                margin-top: 1rem;
                padding: 1.05rem 0.7rem 1.2rem;
                gap: 1.2rem;
            }
            h1 {
                font-size: 1.65rem;
                text-align: center;
            }
            .timer {
                font-size: 2.35rem;
            }
            .controls {
                gap: 0.45rem;
            }
            .controls input[type="number"] {
                width: 56px;
                font-size: 1rem;
            }
            .controls button {
                font-size: 0.98rem;
                padding: 0.48rem 0.82rem;
            }
            .resources,
            .diamonds,
            .rank-section {
                font-size: 1rem;
                text-align: center;
                flex-wrap: wrap;
                justify-content: center;
            }
            #badgesList {
                gap: 0.8rem;
            }
            .kofi-btn {
                font-size: 1rem;
                padding: 0.9rem 0;
                border-radius: 14px;
                max-width: 100%;
            }
            .miner {
                font-size: 2.5rem;
                height: 3.2rem;
                width: 3.2rem;
            }
            .hub-link {
                max-width: 100%;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Le contenu JS sera injecté ici -->
    </div>
    <footer style="text-align: center; margin-top: 20px;">
        <a href="https://cjajlk.github.io/cjajlkGames/" class="hub-link">
            🚀 Retour vers CJajlkGames
        </a>
    </footer>
    <div id="lockOverlay" class="lock-overlay" style="display:none;" role="dialog" aria-modal="true" aria-label="Session verrouillée">
        <div class="lock-card">
            <div class="lock-title">Session en cours : écran verrouillé</div>
            <div class="lock-mining-scene" aria-hidden="true">
                <span class="lock-pickaxe">⛏️</span>
                <span class="lock-rock">🪨</span>
                <span class="lock-spark lock-spark-1">✦</span>
                <span class="lock-spark lock-spark-2">✦</span>
            </div>
            <div class="lock-subtitle">Pour débloquer en cas d'urgence, cliquez ci-dessous (la session sera perdue)</div>
            <button id="unlockBtn" class="lock-unlock-btn">Débloquer (urgence)</button>
        </div>
    </div>
    <audio id="coinSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bfae2.mp3" preload="auto"></audio>
    <div id="rankUpAnim" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:2000;align-items:center;justify-content:center;background:rgba(24,28,36,0.96);flex-direction:column;"></div>
    <div id="copySuccess" style="display:none;position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:1rem 2rem;border-radius:16px;box-shadow:0 0 16px #00ffe7;font-size:1.1rem;z-index:3000;text-align:center;">Succès copié !</div>
    <script>
        // --- Progression & Badges ---
        const ranks = [
            { name: "Novice", min: 0, icon: "🥉", color: "#00ffe7" },
            { name: "Apprenti", min: 5, icon: "🥈", color: "#a259ff" },
            { name: "Aventurier", min: 15, icon: "🥇", color: "#ffd700" },
            { name: "Maître", min: 30, icon: "🏆", color: "#ffb347" },
            { name: "Légende", min: 100, icon: "👑", color: "#ffd700" }
        ];
        const badges = [
            { id: "badge1", label: "Premier Pas", icon: "🌱", tooltip: "Terminer sa toute première session de focus.", check: (r, s) => r >= 1 },
            { id: "badgeStreak", label: "Série de Feu", icon: "🔥", tooltip: "Réussir 3 sessions de focus d'affilée sans aucune triche.", check: (r, s) => s >= 3 },
            { id: "badge10", label: "Routine Installée", icon: "🧩", tooltip: "Atteindre 10 ressources.", check: (r) => r >= 10 },
            { id: "badge30", label: "Focus Pro", icon: "💼", tooltip: "Atteindre 30 ressources.", check: (r) => r >= 30 },
            { id: "badge50", label: "Machine à Focus", icon: "🤖", tooltip: "Atteindre 50 ressources.", check: (r) => r >= 50 },
            { id: "badge100", label: "Légende du Focus", icon: "👑", tooltip: "Atteindre 100 ressources pour débloquer ce badge ultime.", check: (r) => r >= 100 },
            { id: "badge60min", label: "L'Indestructible", icon: "🛡️", tooltip: "Finir une quête de 60 minutes sans quitter l'écran une seule fois.", check: (r, s, l) => l.lastQuest60 },
            { id: "badgeLong", label: "Marathonien", icon: "🏅", tooltip: "Terminer une session de 90 minutes ou plus.", check: (r, s, l) => l.lastQuest90 },
            { id: "badgeStreak10", label: "Inarrêtable", icon: "🚀", tooltip: "Atteindre une série de 10 sessions réussies sans triche.", check: (r, s) => s >= 10 },
            { id: "badgeKofi", label: "Soutien Élite", icon: "☕", tooltip: "Cliquer sur le bouton Ko-fi pour soutenir le créateur.", check: (r, s, l) => l.kofi },
        ];
        let userBadges = {};
        let userRank = 0;
        let streak = 0;
        let lastQuest60 = false;
        let lastQuest90 = false;
        let kofiClicked = false;
        let diamondCount = 0;
        let resourceCount = 0;
        let antiCheatTriggered = false;
        let timerInterval = null;
        let totalSeconds = 1500;
        let remainingSeconds = 1500;
        let running = false;
        // --- Génération du HTML principal ---
        const app = document.getElementById('app-container');
        app.innerHTML = `
            <h1>CJ Focus Chronicles</h1>
            <div class="miner" id="miner">⛏️</div>
            <div class="timer" id="timer">25:00</div>
            <div class="controls">
                <input type="number" id="minutes" min="1" max="120" value="25"> min
                <button id="startBtn">Démarrer</button>
                <button id="resetBtn">Réinitialiser</button>
            </div>
            <div class="diamonds">
                <span class="diamond-icon">💎</span>
                <span id="diamondCount">0</span> CJ
            </div>
            <div class="resources">
                <span class="resource-icon">🪙</span>
                <span id="resourceCount">0</span> Ressources
                <span id="streak" style="margin-left:1rem;font-size:1.1rem;color:#ffd700;text-shadow:0 0 8px #ffd700;display:none;">🔥 X2</span>
            </div>
            <div class="rank-section" id="rankSection">
                <span id="rankTitle">Rang : Novice</span>
                <span id="rankIcon" style="font-size:1.5rem;margin-left:0.5rem;">🥉</span>
            </div>
            <a class="kofi-btn" id="kofiBtn" href="https://ko-fi.com/cjajlk" target="_blank">☕ Faire un don sur Ko-fi</a>
            <div class="alert" id="alert">⚠️ Ne quittez pas l'onglet ou l'application ! Le timer est remis à zéro.</div>
            <div class="badges-section" id="badgesSection">
                <details id="badgesAccordion" open>
                    <summary>🎖️ Badges</summary>
                    <div id="badgesList"></div>
                </details>
            </div>
        `;
        // --- Sélecteurs ---
        const timerDisplay = document.getElementById('timer');
        const minutesInput = document.getElementById('minutes');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const diamondDisplay = document.getElementById('diamondCount');
        const resourceDisplay = document.getElementById('resourceCount');
        const alertBox = document.getElementById('alert');
        const miner = document.getElementById('miner');
        const rankTitle = document.getElementById('rankTitle');
        const rankIcon = document.getElementById('rankIcon');
        const badgesList = document.getElementById('badgesList');
        const streakDisplay = document.getElementById('streak');
        const kofiBtn = document.getElementById('kofiBtn');
        const rankUpAnim = document.getElementById('rankUpAnim');
        const copySuccess = document.getElementById('copySuccess');
        const lockOverlay = document.getElementById('lockOverlay');
        const unlockBtn = document.getElementById('unlockBtn');

        function showLockOverlay() {
            if (lockOverlay) lockOverlay.style.display = 'flex';
            document.body.classList.add('lock-active');
            document.body.style.overflow = 'hidden';
        }

        function hideLockOverlay() {
            if (lockOverlay) lockOverlay.style.display = 'none';
            document.body.classList.remove('lock-active');
            document.body.style.overflow = '';
        }

        function stopSessionAndLose() {
            running = false;
            clearInterval(timerInterval);
            hideLockOverlay();
            alertBox.textContent = "Session annulée : écran débloqué avant la fin.";
            alertBox.style.display = 'block';
            streak = 0;
            streakDisplay.style.display = 'none';
            miner.classList.remove('mining');
            startBtn.disabled = false;
        }

        if (unlockBtn) {
            unlockBtn.addEventListener('click', stopSessionAndLose);
        }

        if (window.innerWidth <= 600) {
            const accordion = document.getElementById('badgesAccordion');
            if (accordion) accordion.removeAttribute('open');
        }
        // --- Fonctions ---
        function updateTimerDisplay() {
            const min = Math.floor(remainingSeconds / 60).toString().padStart(2, '0');
            const sec = (remainingSeconds % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${min}:${sec}`;
        }
        function resetTimer() {
            running = false;
            clearInterval(timerInterval);
            totalSeconds = parseInt(minutesInput.value, 10) * 60;
            remainingSeconds = totalSeconds;
            updateTimerDisplay();
            startBtn.disabled = false;
            miner.classList.remove('mining');
            alertBox.style.display = 'none';
            antiCheatTriggered = false;
            lastQuest60 = false;
            lastQuest90 = false;
            hideLockOverlay();
        }
        function startTimer() {
            if (running) return;
            running = true;
            startBtn.disabled = true;
            alertBox.style.display = 'none';
            antiCheatTriggered = false;
            miner.classList.add('mining');
            showLockOverlay();
            timerInterval = setInterval(() => {
                if (remainingSeconds > 0) {
                    remainingSeconds--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerInterval);
                    running = false;
                    startBtn.disabled = false;
                    miner.classList.remove('mining');
                    hideLockOverlay();
                    diamondCount++;
                    let questDuration = totalSeconds / 60;
                    // --- Streak & badges ---
                    if (!antiCheatTriggered) {
                        streak++;
                        if (streak >= 3) streakDisplay.style.display = 'inline';
                    } else {
                        streak = 0;
                        streakDisplay.style.display = 'none';
                    }
                    // Badge 60min
                    if (!antiCheatTriggered && questDuration >= 60) lastQuest60 = true;
                    else lastQuest60 = false;
                    // Badge 90min
                    if (!antiCheatTriggered && questDuration >= 90) lastQuest90 = true;
                    else lastQuest90 = false;
                    // Gain ressources (X2 si streak)
                    let gain = 1;
                    if (streak >= 3) gain = 2;
                    diamondDisplay.textContent = diamondCount;
                    resourceCount += gain;
                    resourceDisplay.textContent = resourceCount;
                    // Animation diamant
                    diamondDisplay.animate([
                        { transform: 'scale(1)', color: '#fff' },
                        { transform: 'scale(1.4)', color: 'var(--neon-color)' },
                        { transform: 'scale(1)', color: '#fff' }
                    ], { duration: 600 });
                    // Animation ressource
                    resourceDisplay.animate([
                        { transform: 'scale(1)', color: '#fff' },
                        { transform: 'scale(1.4)', color: 'var(--neon-color)' },
                        { transform: 'scale(1)', color: '#fff' }
                    ], { duration: 600 });
                    // Victoire
                    showVictory(gain);
                }
            }, 1000);
        }
        function showVictory(gain) {
            // Progression : update badges/rank
            updateProgression();
            // Ajout bouton copier succès
            if (!document.getElementById('copyBtn')) {
                let btn = document.createElement('button');
                btn.id = 'copyBtn';
                btn.className = 'copy-btn';
                btn.innerText = 'Copier mon succès';
                btn.onclick = function() {
                    let txt = `🔥 J'ai réussi ${resourceCount} quêtes sur CJ Focus Chronicles ! Rang : ${ranks[userRank].name}${streak>=3?' (Streak X2!)':''} 💎 https://cjajlk.github.io/cjajlkGames/`;
                    navigator.clipboard.writeText(txt);
                    copySuccess.style.display = 'block';
                    setTimeout(()=>{copySuccess.style.display='none';}, 1800);
                };
                document.getElementById('badgesSection').appendChild(btn);
            }
        }
        function getCurrentRankIdx(quests) {
            let idx = 0;
            for (let i = 0; i < ranks.length; i++) {
                if (quests >= ranks[i].min) idx = i;
            }
            return idx;
        }
        function updateProgression() {
            // Badges
            for (const badge of badges) {
                if (badge.check(resourceCount, streak, {lastQuest60, lastQuest90, rank:userRank, kofi:kofiClicked})) {
                    userBadges[badge.id] = true;
                }
            }
            saveProgression();
            renderBadges();
            // Rang
            const prevRank = userRank;
            userRank = getCurrentRankIdx(resourceCount);
            renderRank();
            if (userRank !== prevRank) {
                showRankUpAnim();
                updateNeonColor();
            }
            updateNeonColor();
        }
        function renderRank() {
            rankTitle.textContent = `Rang : ${ranks[userRank].name}`;
            rankIcon.textContent = ranks[userRank].icon;
            rankIcon.style.color = ranks[userRank].color;
        }
        function renderBadges() {
            badgesList.innerHTML = '';
            for (const badge of badges) {
                const earned = userBadges[badge.id];
                const span = document.createElement('span');
                span.setAttribute('tabindex', '0');
                span.setAttribute('aria-label', badge.label);
                span.className = 'badge-ico';
                span.textContent = badge.icon;
                if (earned) {
                    span.style.filter = 'none';
                    span.style.boxShadow = '0 0 16px 4px var(--neon-color), 0 0 0 2px var(--neon-color) inset';
                    span.style.background = 'rgba(0,255,231,0.08)';
                    span.classList.add('badge-shine');
                } else {
                    span.style.filter = 'grayscale(1) brightness(0.5)';
                    span.style.boxShadow = 'none';
                    span.style.background = 'none';
                }
                // Tooltip
                span.addEventListener('mouseenter', function(e){
                    showTooltip(badge.tooltip, span);
                });
                span.addEventListener('mouseleave', hideTooltip);
                span.addEventListener('focus', function(e){
                    showTooltip(badge.tooltip, span);
                });
                span.addEventListener('blur', hideTooltip);
                badgesList.appendChild(span);
            }
        }
        function saveProgression() {
            localStorage.setItem('cjfc_badges', JSON.stringify(userBadges));
            localStorage.setItem('cjfc_rank', userRank);
            localStorage.setItem('cjfc_resources', resourceCount);
            localStorage.setItem('cjfc_streak', streak);
            localStorage.setItem('cjfc_lastQuest60', lastQuest60?'1':'');
            localStorage.setItem('cjfc_lastQuest90', lastQuest90?'1':'');
            localStorage.setItem('cjfc_kofi', kofiClicked?'1':'');
        }
        function loadProgression() {
            try {
                userBadges = JSON.parse(localStorage.getItem('cjfc_badges')) || {};
                userRank = parseInt(localStorage.getItem('cjfc_rank'), 10) || 0;
                resourceCount = parseInt(localStorage.getItem('cjfc_resources'), 10) || 0;
                streak = parseInt(localStorage.getItem('cjfc_streak'), 10) || 0;
                lastQuest60 = !!localStorage.getItem('cjfc_lastQuest60');
                lastQuest90 = !!localStorage.getItem('cjfc_lastQuest90');
                kofiClicked = !!localStorage.getItem('cjfc_kofi');
                resourceDisplay.textContent = resourceCount;
                if (streak >= 3) streakDisplay.style.display = 'inline';
            } catch(e) {
                userBadges = {};
                userRank = 0;
                streak = 0;
                lastQuest60 = false;
                lastQuest90 = false;
                kofiClicked = false;
            }
            renderRank();
            renderBadges();
            updateNeonColor();
        }
        function updateNeonColor() {
            let color = ranks[userRank].color;
            document.documentElement.style.setProperty('--neon-color', color);
            app.style.boxShadow = `0 0 32px 4px ${color}, 0 0 0 2px ${color} inset`;
            let h2 = document.querySelector('.badges-section h2');
            if(h2) h2.style.color = color;
        }
        // --- Tooltip badges ---
        let tooltipDiv = null;
        function showTooltip(text, el) {
            hideTooltip();
            tooltipDiv = document.createElement('div');
            tooltipDiv.className = 'badge-tooltip';
            tooltipDiv.innerText = text;
            document.body.appendChild(tooltipDiv);
            let rect = el.getBoundingClientRect();
            tooltipDiv.style.left = (rect.left + rect.width/2 - 80) + 'px';
            tooltipDiv.style.top = (rect.top - 38) + 'px';
        }
        function hideTooltip() {
            if (tooltipDiv) { tooltipDiv.remove(); tooltipDiv = null; }
        }
        // --- Badge Ko-fi ---
        kofiBtn.addEventListener('click', function() {
            kofiClicked = true;
            updateProgression();
        });
        // --- Anti-cheat ---
        function triggerAntiCheat() {
            if (running && !antiCheatTriggered) {
                clearInterval(timerInterval);
                running = false;
                remainingSeconds = totalSeconds;
                updateTimerDisplay();
                alertBox.style.display = 'block';
                startBtn.disabled = false;
                miner.classList.remove('mining');
                antiCheatTriggered = true;
                streak = 0;
                streakDisplay.style.display = 'none';
                hideLockOverlay();
            }
        }
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                triggerAntiCheat();
            }
        });
        window.addEventListener('blur', () => {
            triggerAntiCheat();
        });
        // --- Listeners ---
        startBtn.addEventListener('click', () => {
            resetTimer();
            startTimer();
        });
        resetBtn.addEventListener('click', () => {
            resetTimer();
        });
        minutesInput.addEventListener('change', () => {
            if (!running) {
                resetTimer();
            }
        });
        // --- Animation rang ---
        function showRankUpAnim() {
            rankUpAnim.innerHTML = `<div style='display:flex;flex-direction:column;align-items:center;justify-content:center;'><div style='font-size:3.5rem;text-shadow:0 0 24px var(--neon-color);'>${ranks[userRank].icon}</div><div style='color:${ranks[userRank].color};font-size:2.2rem;font-weight:bold;text-shadow:0 0 16px var(--neon-color);margin-top:1rem;'>Nouveau rang : ${ranks[userRank].name} !</div></div>`;
            rankUpAnim.style.display = 'flex';
            setTimeout(() => { rankUpAnim.style.display = 'none'; }, 2200);
        }
        // --- Initialisation ---
        loadProgression();
        resetTimer();
    </script>
</body>
</html>
