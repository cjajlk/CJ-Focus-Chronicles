
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CJ Focus Chronicles</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <div id="mainContainer" class="container">
    <h1>Focus Chronicles</h1>
    <div class="timer-progress">
      <svg width="120" height="120">
        <circle cx="60" cy="60" r="54" stroke="#222" stroke-width="8" fill="none"/>
        <circle id="progressCircle" cx="60" cy="60" r="54" stroke="#00ffe7" stroke-width="8" fill="none" stroke-linecap="round" style="transition:stroke-dashoffset 0.5s;"/>
      </svg>
      <div id="timer" class="timer">25:00</div>
    </div>
    <div class="controls">
      <input id="minutes" type="number" min="1" max="120" value="25" step="1" aria-label="Durée (minutes)" />
      <button id="startBtn">Démarrer</button>
      <button id="resetBtn">Réinitialiser</button>
    </div>
    <div id="alert" class="alert" style="display:none;">⚠️ Ne quitte pas la page pendant ta session !</div>
    <div class="resources">
      <span class="resource-label">Ressources :</span>
      <span id="resourceCount">0</span>
      <span id="streak" class="streak" style="display:none;">🔥 Streak X2 !</span>
    </div>
    <div id="miner" class="miner">⛏️</div>
    <div class="badges-section">
      <details id="badgesAccordion" open>
        <summary>🎖️ Badges</summary>
        <div id="badgesList" class="badges-list"></div>
      </details>
    </div>
    <div class="rank-section">
      <span id="rankIcon" class="rank-icon">🥉</span>
      <span id="rankTitle" class="rank-title">Rang : Novice</span>
    </div>
    <a id="kofiBtn" class="kofi-btn" title="Soutenir sur Ko-fi" href="https://ko-fi.com/cjajlk" target="_blank" rel="noopener">☕ Ko-fi</a>
  </div>
  <div id="victory" class="victory-modal" style="display:none;">
    <div class="victory-inner">
      <div class="victory-title">Session terminée !</div>
      <div class="victory-content">Bravo, tu as gagné des ressources !</div>
      <button id="victoryClose" class="victory-btn">Fermer</button>
      <div id="copySuccess" class="copy-success" style="display:none;">Succès copié !</div>
    </div>
  </div>
  <div id="rankUpAnim" class="rankup-anim" style="display:none;"></div>
  <a class="hub-link" href="https://cjajlk.github.io/cjajlkGames/" target="_blank" rel="noopener">🌐 Voir tous mes jeux</a>
  <script src="script.js"></script>
</body>
</html>
